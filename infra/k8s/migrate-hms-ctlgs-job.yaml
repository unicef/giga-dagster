apiVersion: batch/v1
kind: Job
metadata:
  name: hms-migrate-ctlgs-location
  namespace: giga-dagster
  labels:
    app.kubernetes.io/name: hms-migrate-ctlgs-location
    app.kubernetes.io/part-of: giga-dataops-platform
    app.kubernetes.io/component: dagster
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql-migrate
          image: postgres:14-alpine
          env:
            - name: PGHOST
              value: "hive-metastore-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: giga-dagster-hive-secrets
                  key: HMS_POSTGRESQL_DATABASE
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: giga-dagster-hive-secrets
                  key: HMS_POSTGRESQL_USERNAME
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: giga-dagster-hive-secrets
                  key: HMS_POSTGRESQL_PASSWORD
            - name: STORAGE_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: giga-dagster-hive-secrets
                  key: STORAGE_ACCOUNT_NAME
            - name: STORAGE_CONTAINER_NAME
              valueFrom:
                secretKeyRef:
                  name: giga-dagster-hive-secrets
                  key: STORAGE_CONTAINER_NAME
          command:
            - sh
            - -c
            - |
              OLD_PREFIX="wasbs://${STORAGE_CONTAINER_NAME}@${STORAGE_ACCOUNT_NAME}.blob.core.windows.net"
              NEW_PREFIX="abfss://${STORAGE_CONTAINER_NAME}@${STORAGE_ACCOUNT_NAME}.dfs.core.windows.net"

              echo "Updating CTLGS.LOCATION_URI: ${OLD_PREFIX} -> ${NEW_PREFIX}"

              psql -v ON_ERROR_STOP=1 -c "
                UPDATE \"CTLGS\"
                SET \"LOCATION_URI\" = replace(\"LOCATION_URI\", '${OLD_PREFIX}', '${NEW_PREFIX}')
                WHERE \"LOCATION_URI\" LIKE '${OLD_PREFIX}%';
              "

              UPDATED=$(psql -t -A -c "SELECT COUNT(*) FROM \"CTLGS\" WHERE \"LOCATION_URI\" LIKE 'abfss://%';")
              echo "CTLGS rows now using abfss://: ${UPDATED}"
              echo "Migration complete"
